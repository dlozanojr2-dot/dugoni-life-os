  var b2ab = function (b64) { var s = atob(b64), a = new Uint8Array(s.length); for (var i=0;i<s.length;i++) a[i]=s.charCodeAt(i); return a.buffer; };
  var form = document.getElementById('lock'), pw = document.getElementById('pw'),
      go = document.getElementById('go'), err = document.getElementById('err');

  async function unlock(pass) {
    var enc = new TextEncoder();
    var baseKey = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b2ab(ENC.salt), iterations:ENC.iter, hash:'SHA-256' },
      baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    var plainBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b2ab(ENC.iv) }, key, b2ab(ENC.ct));
    return new TextDecoder().decode(plainBuf);
  }

  async function attempt(pass, remember) {
    go.disabled = true; err.textContent = '';
    try {
      var html = await unlock(pass);
      if (remember) { try { sessionStorage.setItem('dlos.k', pass); } catch(e){} }
      document.open(); document.write(html); document.close();
    } catch (e) {
      go.disabled = false; err.textContent = 'Wrong passphrase.'; pw.value = ''; pw.focus();
      try { sessionStorage.removeItem('dlos.k'); } catch(_){}

  form.addEventListener('submit', function (e) { e.preventDefault(); if (pw.value) attempt(pw.value, true); });

  (function () { var k; try { k = sessionStorage.getItem('dlos.k'); } catch(e){} if (k) attempt(k, false); })();
